<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ノロウイルス対応研修 確認テスト</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#f2f4f8;
margin:0;
line-height:1.8;
}

/* タイマー */

#timer{
position:fixed;
top:10px;
left:10px;
font-weight:bold;
color:red;
background:white;
padding:8px 12px;
border-radius:6px;
z-index:999;
}

/* 問題 */

.question{
padding:25px;
margin:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.question:nth-child(odd){
background:#d9eef2;
}

.question:nth-child(even){
background:white;
}

label{
display:block;
padding:8px;
cursor:pointer;
}

/* 下パネル */

#bottomPanel{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
border-top:2px solid #ccc;
padding:15px;
}

#nav{
display:grid;
grid-template-columns:repeat(8,1fr);
gap:6px;
margin-bottom:10px;
}

.navBtn{
background:silver;
border-radius:4px;
padding:6px;
text-align:center;
font-size:12px;
}

.answered{
background:#4CAF50;
color:white;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#1976d2;
color:white;
cursor:pointer;
margin:5px;
}

/* 確認ページ */

#confirmScreen{
display:none;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#eee;
}

</style>
</head>

<body>

<div id="timer">残り 10:00</div>

<h2 style="text-align:center;margin-top:50px">
ノロウイルス対応研修 確認テスト
</h2>

<form id="quizForm">

<div class="question">
<b>問1 ノロウイルスの潜伏期間は？</b>
<label><input type="radio" name="q1" value="A">6〜12時間</label>
<label><input type="radio" name="q1" value="B">12〜24時間</label>
<label><input type="radio" name="q1" value="C">24〜48時間</label>
<label><input type="radio" name="q1" value="D">3〜5日</label>
</div>

<div class="question">
<b>問2 感染力が最も強い期間は？</b>
<label><input type="radio" name="q2" value="A">発症前</label>
<label><input type="radio" name="q2" value="B">発症後約3日</label>
<label><input type="radio" name="q2" value="C">1週間後</label>
<label><input type="radio" name="q2" value="D">1ヶ月後</label>
</div>

<div class="question">
<b>問3 最も重要な対策は？</b>
<label><input type="radio" name="q3" value="A">アルコール</label>
<label><input type="radio" name="q3" value="B">石けん手洗い</label>
<label><input type="radio" name="q3" value="C">水拭き</label>
<label><input type="radio" name="q3" value="D">手袋のみ</label>
</div>

<div class="question">
<b>問4 PPEは？</b>
<label><input type="radio" name="q4" value="A">手袋のみ</label>
<label><input type="radio" name="q4" value="B">手袋＋マスク</label>
<label><input type="radio" name="q4" value="C">ガウン＋マスク</label>
<label><input type="radio" name="q4" value="D">フルPPE</label>
</div>

<button type="button" onclick="saveAnswers()">回答を保存</button>

</form>

<!-- 確認ページ -->

<div id="confirmScreen">

<h2>回答確認</h2>

<table id="confirmTable">

<tr>
<th>問題</th>
<th>解答状況</th>
<th>あなたの解答</th>
</tr>

</table>

<br>

<div style="text-align:center">

<button onclick="backToEdit()" style="background:#999">
受験画面に戻る
</button>

<button onclick="submitQuiz()">
解答を送信して受験を終了する
</button>

</div>

</div>

<div id="result"></div>

<!-- 下ナビ -->

<div id="bottomPanel">

<div id="nav"></div>

<button onclick="saveAnswers()">回答一時保存</button>

</div>

<script>

const answers={
q1:"C",
q2:"B",
q3:"B",
q4:"D"
};

const explanations={
q1:"潜伏期間は24〜48時間です。",
q2:"発症後3日が感染力ピークです。",
q3:"石けん手洗いが重要です。",
q4:"嘔吐物処理ではフルPPEです。"
};

/* ナビ生成 */

const nav=document.getElementById("nav");

for(let i=1;i<=4;i++){

let btn=document.createElement("div");

btn.className="navBtn";

btn.innerText=i;

btn.onclick=function(){

document.querySelectorAll(".question")[i-1]
.scrollIntoView({behavior:"smooth"});

};

nav.appendChild(btn);

}

/* 回答検知 */

document.querySelectorAll("input").forEach(r=>{

r.addEventListener("change",function(){

let q=this.name.replace("q","");

document.querySelectorAll(".navBtn")[q-1]
.classList.add("answered");

});

});

/* 保存 */

function saveAnswers(){

let html="";

for(let i=1;i<=4;i++){

let ans=document.querySelector('input[name="q'+i+'"]:checked');

if(ans){

html+=`
<tr>
<td>${i}</td>
<td>解答済み</td>
<td>${ans.value}</td>
</tr>
`;

}else{

html+=`
<tr>
<td>${i}</td>
<td style="color:red">未回答</td>
<td>-</td>
</tr>
`;

}

}

document.getElementById("confirmTable").innerHTML=
`
<tr>
<th>問題</th>
<th>解答状況</th>
<th>あなたの解答</th>
</tr>
`+html;

document.getElementById("quizForm").style.display="none";

document.getElementById("confirmScreen").style.display="block";

window.scrollTo(0,0);

}

/* 戻る */

function backToEdit(){

document.getElementById("confirmScreen").style.display="none";

document.getElementById("quizForm").style.display="block";

}

/* 採点 */

function submitQuiz(){

let score=0;

for(let q in answers){

let ans=document.querySelector('input[name="'+q+'"]:checked');

if(ans && ans.value===answers[q]) score++;

}

let html="<h2>結果 "+score+" / 4</h2><hr>";

for(let i=1;i<=4;i++){

html+=`
<b>問${i} 正解 ${answers["q"+i]}</b><br>
${explanations["q"+i]}<br><br>
`;

}

document.getElementById("confirmScreen").style.display="none";
document.getElementById("bottomPanel").style.display="none";
document.getElementById("timer").style.display="none";

document.getElementById("result").innerHTML=html;

}

/* タイマー */

let time=600;

setInterval(function(){

time--;

let m=Math.floor(time/60);
let s=time%60;

if(s<10)s="0"+s;

document.getElementById("timer").innerText=
"残り "+m+"分"+s+"秒";

if(time<=0){

alert("時間終了");

submitQuiz();

}

},1000);

</script>

</body>
</html>
